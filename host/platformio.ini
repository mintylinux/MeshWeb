; PlatformIO Project Configuration File for MeshCore Web Node
; A MeshCore repeater with WiFi AP and web server for text-based internet

[platformio]
default_envs = heltec-v3

[env]
framework = arduino
platform = espressif32@6.11.0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
  me-no-dev/ESPAsyncWebServer @ ^3.6.0
  bblanchon/ArduinoJson @ ^7.3.0
  jgromes/RadioLib @ ^7.3.0
  rweather/Crypto @ ^0.4.0

build_flags = 
  -w
  -DNDEBUG
  -DRADIOLIB_STATIC_ONLY=1
  -DRADIOLIB_GODMODE=1
  -DLORA_FREQ=868.100
  -DLORA_BW=250
  -DLORA_SF=11
  ; IMPORTANT: Using 868.100 MHz for MeshWeb testing
  ; This is separate from main MeshCore network at 869.525
  -DENABLE_ADVERT_ON_BOOT=1
  -DRADIOLIB_EXCLUDE_CC1101=1
  -DRADIOLIB_EXCLUDE_RF69=1
  -DRADIOLIB_EXCLUDE_SX1231=1
  -DRADIOLIB_EXCLUDE_SI443X=1
  -DRADIOLIB_EXCLUDE_RFM2X=1
  -DRADIOLIB_EXCLUDE_SX128X=1
  -DRADIOLIB_EXCLUDE_AFSK=1
  -DRADIOLIB_EXCLUDE_AX25=1
  -DRADIOLIB_EXCLUDE_HELLSCHREIBER=1
  -DRADIOLIB_EXCLUDE_MORSE=1
  -DRADIOLIB_EXCLUDE_APRS=1
  -DRADIOLIB_EXCLUDE_BELL=1
  -DRADIOLIB_EXCLUDE_RTTY=1
  -DRADIOLIB_EXCLUDE_SSTV=1
  -DESP32
  -DWIFI_SSID=\"MeshCore-Web\"
  -DWIFI_PASSWORD=\"meshcore123\"

build_src_filter = 
  +<main_radiolib.cpp>
  -<main.cpp>
  -<main_full_meshcore.cpp>

[env:tbeam]
board = ttgo-t-beam
build_flags = 
  ${env.build_flags}
  -DTBEAM
  -DBOARD_HAS_PSRAM

[env:heltec-v3]
board = heltec_wifi_lora_32_V3
upload_port = /dev/tty*
monitor_port = /dev/tty*
upload_speed = 115200
upload_flags = 
  --before=default_reset
  --after=hard_reset
build_flags =
  ${env.build_flags}
  -DHELTEC_V3
  -DBOARD_HAS_PSRAM
  ; Heltec V3 pin definitions
  -DLORA_SCK=9
  -DLORA_MISO=11
  -DLORA_MOSI=10
  -DLORA_CS=8
  -DLORA_RST=12
  -DLORA_DIO0=14
  -DLORA_DIO1=14
  -DLORA_BUSY=13
