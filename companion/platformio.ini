; PlatformIO Project Configuration File for MeshCore Companion Node
; ESP32 Xiao with LoRa module - receives PAGE_ANNOUNCE and requests pages

[platformio]
default_envs = xiao_esp32s3

[env]
framework = arduino
platform = espressif32@6.11.0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
  jgromes/RadioLib @ ^7.3.0
  me-no-dev/ESPAsyncWebServer @ ^3.6.0
  bblanchon/ArduinoJson @ ^7.3.0

build_flags = 
  -w
  -DRADIOLIB_STATIC_ONLY=1
  -DRADIOLIB_GODMODE=1
  -DLORA_FREQ=868.0
  -DLORA_BW=250
  -DLORA_SF=11
  -DRADIOLIB_EXCLUDE_CC1101=1
  -DRADIOLIB_EXCLUDE_RF69=1
  -DRADIOLIB_EXCLUDE_SX1231=1
  -DRADIOLIB_EXCLUDE_SI443X=1
  -DRADIOLIB_EXCLUDE_RFM2X=1
  -DRADIOLIB_EXCLUDE_SX128X=1
  -DRADIOLIB_EXCLUDE_AFSK=1
  -DRADIOLIB_EXCLUDE_AX25=1
  -DRADIOLIB_EXCLUDE_HELLSCHREIBER=1
  -DRADIOLIB_EXCLUDE_MORSE=1
  -DRADIOLIB_EXCLUDE_APRS=1
  -DRADIOLIB_EXCLUDE_BELL=1
  -DRADIOLIB_EXCLUDE_RTTY=1
  -DRADIOLIB_EXCLUDE_SSTV=1

; ============================================================
; WiFi + BLE builds (default - full featured)
; ============================================================

[env:xiao_esp32s3]
board = seeed_xiao_esp32s3
upload_speed = 460800
monitor_port = /dev/ttyUSB*
upload_port = /dev/ttyUSB*
board_build.partitions = default.csv
board_build.flash_mode = dio
lib_deps =
  ${env.lib_deps}
  h2zero/NimBLE-Arduino @ ^1.4.0
build_flags = 
  ${env.build_flags}
  -DXIAO_ESP32S3
  -DENABLE_BLE
  -DWIFI_SSID=\"MeshWeb-Browser\"
  -DWIFI_PASSWORD=\"meshweb123\"
  ; LoRa pins for XIAO ESP32-S3 + Wio-SX1262
  ; From MeshCore xiao_s3_wio configuration (PROVEN WORKING)
  -DLORA_SCK=7
  -DLORA_MISO=8
  -DLORA_MOSI=9
  -DLORA_CS=41
  -DLORA_RST=42
  -DLORA_DIO1=39
  -DLORA_BUSY=40
  -DLORA_RXEN=38

[env:heltec_v3]
board = heltec_wifi_lora_32_V3
upload_speed = 115200
monitor_port = /dev/ttyUSB*
upload_port = /dev/ttyUSB*
lib_deps =
  ${env.lib_deps}
  h2zero/NimBLE-Arduino @ ^1.4.0
build_flags = 
  ${env.build_flags}
  -DHELTEC_V3
  -DBOARD_HAS_PSRAM
  -DENABLE_BLE
  -DWIFI_SSID=\"MeshWeb-Browser\"
  -DWIFI_PASSWORD=\"meshweb123\"
  ; Heltec V3 LoRa pins (SX1262)
  -DLORA_SCK=9
  -DLORA_MISO=11
  -DLORA_MOSI=10
  -DLORA_CS=8
  -DLORA_RST=12
  -DLORA_DIO1=14
  -DLORA_BUSY=13

